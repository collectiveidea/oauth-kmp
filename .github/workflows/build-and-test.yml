name: Build and Test

on:
  pull_request:
    paths-ignore:
      - "**.md"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Java 24
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 24

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew testAndroidHostTest

      - name: Archive Runtime Test Report
        if: success() || failure() # Allow canceling per https://stackoverflow.com/a/73015952
        uses: actions/upload-artifact@v7
        with:
          name: testAndroidHostTest report
          path: oauth-core/build/reports/tests/testAndroidHostTest
