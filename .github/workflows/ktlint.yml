name: Lint - Kotlin

on:
  pull_request:
    paths-ignore:
      - "**.md"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ktlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install ktlint 1.8.0
        # https://ktlint.github.io/ktlint/latest/install/cli/#download-using-curl
        run: |
          curl -sSLO https://github.com/ktlint/ktlint/releases/download/1.8.0/ktlint
          chmod a+x ktlint
          mv ktlint /usr/local/bin/

      - name: ktlint version
        run: ktlint --version

      - name: ktlint
        run: ktlint
